name: Go CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Build & Test
    strategy:
      matrix:
        # Running on both Linux and Windows ensures your build tags (!windows) work
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          # Enabling cache helps speed up Windows builds specifically
          cache: true
      
      # Increase UDP buffer limits (Linux only)
      - name: Increase UDP buffer limits (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo sysctl -w net.core.rmem_max=2500000
          sudo sysctl -w net.core.wmem_max=2500000

      # Optional: Attempt tweak on Windows (not always effective)
      - name: Adjust UDP settings (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          try {
            Set-NetUDPSetting -DynamicPortRangeStartPort 1024 -DynamicPortRangeNumberOfPorts 64511
          } catch {
            Write-Host "Skipping UDP tuning (not supported in runner)"
          }
      
      - name: Build
        run: go build -v ./...

      - name: Test
        # Windows requires no special shell flags for standard go test commands
        run: go test -v ./...
