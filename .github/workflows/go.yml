name: Go CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Build & Test
    strategy:
      matrix:
        # Running on both Linux and Windows ensures your build tags (!windows) work
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          # Enabling cache helps speed up Windows builds specifically
          cache: true

      - name: Build
        run: go build -v ./...

      - name: Test
        # Windows requires no special shell flags for standard go test commands
        run: go test -v ./...
